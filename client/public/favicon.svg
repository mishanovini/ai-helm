<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="url(#g)" stroke-width="2.5"/>
  <!-- Inner hub -->
  <circle cx="16" cy="16" r="4" fill="url(#g)"/>
  <!-- Spokes (8 directions) -->
  <g stroke="url(#g)" stroke-width="2" stroke-linecap="round">
    <line x1="16" y1="4" x2="16" y2="12"/>
    <line x1="16" y1="20" x2="16" y2="28"/>
    <line x1="4" y1="16" x2="12" y2="16"/>
    <line x1="20" y1="16" x2="28" y2="16"/>
    <line x1="7.5" y1="7.5" x2="12.3" y2="12.3"/>
    <line x1="19.7" y1="19.7" x2="24.5" y2="24.5"/>
    <line x1="24.5" y1="7.5" x2="19.7" y2="12.3"/>
    <line x1="12.3" y1="19.7" x2="7.5" y2="24.5"/>
  </g>
  <!-- Spoke handles (knobs at outer ring) -->
  <g fill="url(#g)">
    <circle cx="16" cy="3" r="1.5"/>
    <circle cx="16" cy="29" r="1.5"/>
    <circle cx="3" cy="16" r="1.5"/>
    <circle cx="29" cy="16" r="1.5"/>
    <circle cx="6.8" cy="6.8" r="1.5"/>
    <circle cx="25.2" cy="25.2" r="1.5"/>
    <circle cx="25.2" cy="6.8" r="1.5"/>
    <circle cx="6.8" cy="25.2" r="1.5"/>
  </g>
</svg>
