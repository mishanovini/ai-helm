  <polygon points="1.5,16 13,17.5 16,16 13,14.5" fill="url(#g)"/>
  <!-- Ordinal points (NE/SE/SW/NW) -->
  <polygon points="26,6 18,14 16,16 14,14" fill="url(#g)" opacity="0.55"/>
  <polygon points="6,26 14,18 16,16 18,18" fill="url(#g)" opacity="0.55"/>
