      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>
  <!-- Double ring — boosted for small/dark contexts -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="url(#g)" stroke-width="1.4" opacity="0.6"/>
  <circle cx="16" cy="16" r="13" fill="none" stroke="url(#g)" stroke-width="0.8" opacity="0.4"/>
